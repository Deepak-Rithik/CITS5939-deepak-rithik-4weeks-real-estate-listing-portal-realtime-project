version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: real_estate_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: real_estate_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - real_estate_network

  redis:
    image: redis:7-alpine
    container_name: real_estate_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - real_estate_network

volumes:
  postgres_data:
  redis_data:

networks:
  real_estate_network:
    driver: bridge
